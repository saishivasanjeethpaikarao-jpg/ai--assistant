version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: trading-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=True
      - FLASK_PORT=5000
    volumes:
      - ./src:/app/src
      - ./backend:/app/backend
    command: flask run --host=0.0.0.0
    networks:
      - trading-network

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: trading-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    networks:
      - trading-network

networks:
  trading-network:
    driver: bridge
