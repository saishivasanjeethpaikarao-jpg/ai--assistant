[build]
  command = "npm run build"
  publish = "dist"
  functions = "functions"

[env]
  [env.production]
    REACT_APP_API_URL = "https://trading-system-api.railway.app/api"

[dev]
  command = "npm start"
  port = 3000
  targetPort = 3000
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
