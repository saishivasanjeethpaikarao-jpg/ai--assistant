name: Build Airis Desktop & Mobile

on:
  push:
    tags:
      - 'v*'           # Triggers on version tags like v1.0.0
  workflow_dispatch:   # Also allows manual trigger from GitHub Actions tab

jobs:
  # ─────────────────────────────────────────
  # 1. BUILD WINDOWS EXE
  # ─────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: windows-rust-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri Windows app
        working-directory: frontend
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: airis-windows
          path: |
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe

  # ─────────────────────────────────────────
  # 2. BUILD ANDROID APK
  # ─────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: android-rust-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Initialize Tauri Android
        working-directory: frontend
        run: npm run tauri android init

      - name: Build Tauri Android APK
        working-directory: frontend
        run: npm run tauri android build -- --apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: airis-android
          path: frontend/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  # ─────────────────────────────────────────
  # 3. CREATE GITHUB RELEASE WITH BOTH FILES
  # ─────────────────────────────────────────
  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: airis-windows
          path: ./release-files/windows

      - name: Download Android build
        uses: actions/download-artifact@v4
        with:
          name: airis-android
          path: ./release-files/android

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Airis ${{ github.ref_name }}
          body: |
            ## 🤖 Airis ${{ github.ref_name }}

            An Iron Man-style AI assistant with 12-layer brain, voice cloning, 
            stock trading intelligence, and autonomous task execution.

            ### Downloads
            - 🖥️ **Windows** — Download the `.exe` or `.msi` installer below
            - 📱 **Android** — Download the `.apk` file below

            ### Installation
            **Windows:** Run the installer and follow the setup wizard.  
            **Android:** Enable "Install from unknown sources" in Settings, then open the APK.
          files: |
            ./release-files/windows/**
            ./release-files/android/**
          draft: false
          prerelease: false
