name: Build Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create assets directory
        run: New-Item -ItemType Directory -Force -Path assets

      - name: Generate default icon (PNG)
        run: |
          python -c "
          try:
              from PIL import Image, ImageDraw, ImageFont
              img = Image.new('RGBA', (256, 256), (67, 97, 238, 255))
              draw = ImageDraw.Draw(img)
              draw.text((50, 80), 'A', fill=(255,255,255,255))
              img.save('assets/app.png')
          except:
              with open('assets/app.png', 'wb') as f: f.write(b'')
          "

      - name: Convert PNG to ICO
        run: |
          python -c "
          try:
              from PIL import Image
              img = Image.open('assets/app.png')
              img.save('assets/app.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          except:
              pass
          "

      - name: Build EXE with PyInstaller
        run: pyinstaller --noconfirm --clean --onefile --windowed --name Airis --icon assets/app.ico --add-data "backend;backend" --add-data ".env.template;." --add-data "LICENSE;." app.spec

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: 'Airis ${{ steps.tag.outputs.TAG }}'
          body: |
            ## Airis Desktop App (Windows)

            Download `Airis.exe` below and run it.

            **Features:**
            - Voice assistant with AI
            - Trading analysis
            - Smart reminders
            - Self-improvement
          draft: false
          prerelease: false
          files: dist/Airis.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            label: linux
          - platform: windows-latest
            label: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './frontend/src-tauri -> target'

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            imagemagick

      - name: Install ImageMagick (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install imagemagick -y

      - name: Create icon directory (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p frontend/src-tauri/icons
          convert frontend/public/airis-sphere.png -resize 32x32   frontend/src-tauri/icons/32x32.png
          convert frontend/public/airis-sphere.png -resize 128x128  frontend/src-tauri/icons/128x128.png
          convert frontend/public/airis-sphere.png -resize 256x256  frontend/src-tauri/icons/128x128@2x.png
          convert frontend/public/airis-sphere.png -define icon:auto-resize=256,128,64,48,32,16 frontend/src-tauri/icons/icon.ico

      - name: Create icon directory (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path frontend/src-tauri/icons
          $magick = "magick"
          & $magick frontend/public/airis-sphere.png -resize 32x32   frontend/src-tauri/icons/32x32.png
          & $magick frontend/public/airis-sphere.png -resize 128x128  frontend/src-tauri/icons/128x128.png
          & $magick frontend/public/airis-sphere.png -resize 256x256  frontend/src-tauri/icons/128x128@2x.png
          & $magick frontend/public/airis-sphere.png -define icon:auto-resize=256,128,64,48,32,16 frontend/src-tauri/icons/icon.ico

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: 'Airis ${{ github.ref_name }}'
          releaseBody: |
            ## Airis Desktop App

            Download the installer for your platform below.

            - **Windows**: `Airis_*_x64_en-US.msi`
            - **Linux (Debian/Ubuntu)**: `airis_*_amd64.deb`
            - **Linux (AppImage)**: `airis_*_amd64.AppImage`
          releaseDraft: false
          prerelease: false
